<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green API Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="input-panel">
            <div class="section">
                <div class="input-group">
                    <label for="idInstance">idInstance</label>
                    <input type="text" id="idInstance" placeholder="Enter idInstance">
                </div>
                <div class="input-group">
                    <label for="apiTokenInstance">apiTokenInstance</label>
                    <input type="text" id="apiTokenInstance" placeholder="Enter apiTokenInstance">
                </div>
            </div>

            <div class="section">
                <button id="getSettings" class="btn">getSettings</button>
            </div>

            <div class="section">
                <h3>Send Message</h3>
                <div class="input-group">
                    <label for="messageRecipient">Recipient</label>
                    <input type="text" id="messageRecipient" placeholder="Enter recipient">
                </div>
                <div class="input-group">
                    <label for="messageText">Message</label>
                    <input type="text" id="messageText" placeholder="Enter message">
                </div>
                <button id="sendMessage" class="btn btn-primary">sendMessage</button>
            </div>

            <!-- <div class="section">
                <h3>Send File by URL</h3>
                <div class="input-group">
                    <label for="fileRecipient">Recipient</label>
                    <input type="text" id="fileRecipient" value="77771234567" placeholder="Enter recipient">
                </div>
                <div class="input-group">
                    <label for="fileUrl">File URL</label>
                    <input type="text" id="fileUrl" value="heeps://my.sice.com/img/horse.png" placeholder="Enter file URL">
                </div>
                <button id="sendFileByUrl" class="btn btn-primary">sendFileByUrl</button>
            </div> -->
        </div>

        <div class="output-panel">
            <h2 class="output-label">Ответ:</h2>
            <div id="output" class="output-content">
                <pre id="outputJson"></pre>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
